name: Example app

# Builds the example app on both iOS and Android and uploads the result
# to Maestro Cloud for the tagged flows under `apps/example/.maestro/`.
# Triggered by changes that affect the library or the example app, plus
# a weekly cron to catch upstream regressions, plus manual dispatch.

on:
  pull_request:
    paths:
      - "packages/react-native-fabric-shimmer/**"
      - "apps/example/**"
      - ".github/workflows/example.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: example-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/setup-java@v5
        with: { distribution: "temurin", java-version: "17" }
      - run: corepack enable
      - uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F react-native-fabric-shimmer build
      - run: pnpm -F rn-fabric-shimmer-example prebuild:android
      # Build the release APK headlessly; the `android:release` script
      # uses `expo run:android` which expects a connected device/emulator
      # and fails in CI. `android:build` invokes gradlew assembleRelease
      # directly so the artifact is produced without any device.
      - run: pnpm -F rn-fabric-shimmer-example android:build
      - uses: mobile-dev-inc/action-maestro-cloud@v3
        with:
          api-key: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          app-file: apps/example/android/app/build/outputs/apk/release/app-release.apk
          workspace: apps/example/.maestro
          include-tags: e2e

  ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: corepack enable
      - uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F react-native-fabric-shimmer build
      - run: pnpm -F rn-fabric-shimmer-example prebuild:ios
      - run: cd apps/example/ios && pod install
      # `ios:release` uses `expo run:ios` which expects a connected
      # simulator and fails in CI. `ios:build` calls xcodebuild
      # directly with CODE_SIGNING_ALLOWED=NO so the simulator .app
      # bundle is produced without device interaction.
      - run: pnpm -F rn-fabric-shimmer-example ios:build
      - uses: mobile-dev-inc/action-maestro-cloud@v3
        with:
          api-key: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          app-file: apps/example/ios/build/Build/Products/Release-iphonesimulator/rn-fabric-shimmer-example.app
          workspace: apps/example/.maestro
          include-tags: e2e
