packages:
  - "packages/*"
  - "apps/*"
  - "docs"

# Block versions published in the last 72 hours from being installable.
# Buys time for the community to catch typosquats and compromised
# maintainer releases (the canonical event-stream / chalk / debug
# supply-chain pattern). 4320 minutes = 72 hours.
minimumReleaseAge: 4320

# Refuse exotic transitive dependency sources (git+ URLs, custom
# tarballs, local paths). Currently 0 such sources in the lockfile;
# enabling the gate prevents a future indirect dep from sneaking one
# in. Direct deps from non-registry sources still work — only
# transitive ones are blocked.
blockExoticSubdeps: true

# pnpm 11 surfaces native-binary build scripts and asks each one to be
# opted in. Decisions per package:
#   @swc/core / esbuild / unrs-resolver: have @scoped platform-specific
#     prebuilt packages (e.g. @img/sharp-darwin-arm64), so the main
#     package's postinstall is just a wrapper compile that's safe to
#     skip on our platforms (macos-arm64, linux-x64).
#   sharp: Astro docs uses it for image processing at build time. Most
#     of the work is in @img/sharp-* platform packages, but the
#     postinstall does setup that some Astro versions assume — allow
#     it to keep the docs build robust.
allowBuilds:
  "@swc/core": false
  esbuild: false
  sharp: true
  unrs-resolver: false

# Workspace-wide version pins. pnpm 11 honours overrides defined in
# pnpm-workspace.yaml (the canonical location); duplicating them in
# package.json's `pnpm.overrides` is supported but no longer the
# primary source.
#
# Why these are pinned:
#   - semver: avoid the prototype-pollution-vulnerable ranges.
#   - react / react-dom: Expo SDK 55 expects React 19.2.0 exactly;
#     letting it drift (19.2.5/6) makes the docs / Storybook / example
#     resolve different patches inside one workspace — a common
#     concurrent-features debugging trap.
#   - react-native-reanimated / react-native-worklets: RN 0.83 Fabric
#     compat (4.2.1 + 0.7.4 is the known-good pair).
overrides:
  semver: ^7.6.0
  react: 19.2.0
  react-dom: 19.2.0
  react-native: 0.83.6
  react-native-reanimated: 4.2.1
  react-native-worklets: 0.7.4
